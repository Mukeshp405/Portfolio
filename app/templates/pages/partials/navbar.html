<script>
    document.addEventListener('DOMContentLoaded', () => {
        const menuBtn = document.getElementById('menu-btn');
        const dropdownMenu = document.getElementById('dropdown-menu');
        const menuIcon = document.getElementById('menu-icon');
        let isMenuOpen = false;

        function toggleMenu() {
            isMenuOpen = !isMenuOpen;
            
            if (isMenuOpen) {
                // Dropdown open animation classes
                dropdownMenu.classList.remove('opacity-0', 'invisible', 'translate-y-[-15px]');
                dropdownMenu.classList.add('opacity-100', 'visible', 'translate-y-0');
                
                // Button active styling & Icon rotation
                menuIcon.style.transform = 'rotate(180deg)';
                menuBtn.classList.replace('bg-white/90', 'bg-emerald-400');
                menuBtn.classList.replace('text-gray-800', 'text-white');
            } else {
                // Dropdown close animation classes
                dropdownMenu.classList.add('opacity-0', 'invisible', 'translate-y-[-15px]');
                dropdownMenu.classList.remove('opacity-100', 'visible', 'translate-y-0');
                
                // Button revert styling & Icon rotation
                menuIcon.style.transform = 'rotate(0deg)';
                menuBtn.classList.replace('bg-emerald-400', 'bg-white/90');
                menuBtn.classList.replace('text-white', 'text-gray-800');
            }
        }

        // Click event on the Menu button
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Prevents instant closing
            toggleMenu();
        });

        // Close the dropdown if clicked outside of it
        document.addEventListener('click', (event) => {
            if (isMenuOpen && !dropdownMenu.contains(event.target)) {
                toggleMenu();
            }
        });
    });
</script>
